<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uphold Payment Widget – Prototype</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STYLES = `
      @keyframes shimmer {
        0% { background-position: -600px 0; }
        100% { background-position: 600px 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes popIn {
        0%   { transform: scale(0); opacity: 0; }
        55%  { transform: scale(1.18); opacity: 1; }
        75%  { transform: scale(0.92); }
        90%  { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      @keyframes drawCheck {
        to { stroke-dashoffset: 0; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .success-icon {
        animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      .success-check {
        stroke-dasharray: 23;
        stroke-dashoffset: 23;
        animation: drawCheck 0.35s ease-out 0.45s forwards;
      }
      .success-title {
        opacity: 0;
        animation: fadeUp 0.4s ease-out 0.55s forwards;
      }
      @keyframes countdown {
        from { stroke-dashoffset: 0; }
        to   { stroke-dashoffset: 339; }
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      .sheet-slide-up {
        animation: slideUp 0.38s cubic-bezier(0.32, 0.72, 0, 1) forwards;
      }
      .countdown-ring {
        transform: rotate(90deg) scaleX(-1);
        transform-origin: 60px 60px;
        animation: countdown 4s linear 0.6s forwards;
      }
      .shimmer {
        background: linear-gradient(90deg, #e8eaed 25%, #f5f6f8 50%, #e8eaed 75%);
        background-size: 600px 100%;
        animation: shimmer 1.4s infinite linear;
      }
      .spin {
        animation: spin 0.8s linear infinite;
      }
      .cursor-blink {
        animation: blink 1s step-end infinite;
      }
      .cvv-input::placeholder {
        color: #c0c4d0;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
      input:focus { outline: none; }
      button { cursor: pointer; border: none; background: none; }
    `;

    // ─── Shared primitives ───────────────────────────────────────────────────────

    function DynamicIsland() {
      return (
        <div style={{ display: "flex", justifyContent: "center", paddingTop: 12, paddingBottom: 4 }}>
          <div style={{ width: 125, height: 35, background: "#000", borderRadius: 20 }} />
        </div>
      );
    }

    function LightStatusBar() {
      return (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 24px 0" }}>
          <span style={{ fontSize: 15, fontWeight: 600, color: "#000" }}>09:30</span>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
              <rect x="0" y="3" width="3" height="9" rx="1" fill="#000"/>
              <rect x="4.5" y="2" width="3" height="10" rx="1" fill="#000"/>
              <rect x="9" y="0" width="3" height="12" rx="1" fill="#000"/>
              <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000" opacity="0.3"/>
            </svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="#000">
              <path d="M8 2.4C10.8 2.4 13.3 3.5 15.1 5.3L16 4.4C13.9 2.3 11.1 1 8 1C4.9 1 2.1 2.3 0 4.4L0.9 5.3C2.7 3.5 5.2 2.4 8 2.4Z"/>
              <path d="M8 5.2C10 5.2 11.8 6 13.2 7.3L14.1 6.4C12.4 4.8 10.3 3.8 8 3.8C5.7 3.8 3.6 4.8 1.9 6.4L2.8 7.3C4.2 6 6 5.2 8 5.2Z"/>
              <circle cx="8" cy="11" r="1.5"/>
            </svg>
            <div style={{ display: "flex", gap: 1, alignItems: "center" }}>
              <div style={{ width: 25, height: 12, border: "1.5px solid #000", borderRadius: 3, padding: "1.5px", display: "flex", alignItems: "center" }}>
                <div style={{ width: "80%", height: "100%", background: "#000", borderRadius: 1.5 }} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Spinner({ size = 24, color = "#3650c2" }) {
      return (
        <div className="spin" style={{
          width: size, height: size,
          border: `3px solid ${color}22`,
          borderTopColor: color,
          borderRadius: "50%"
        }} />
      );
    }

    function RiskBanner() {
      return (
        <div style={{
          padding: "10px 14px",
          background: "#fff6e7",
          display: "flex",
          gap: 10,
          alignItems: "flex-start"
        }}>
          <p style={{ fontSize: 12.5, lineHeight: 1.5, color: "#121112" }}>
            Don't invest unless you're prepared to lose all the money you invest. This is a high-risk investment and you should not expect to be protected if something goes wrong.{" "}
            <span style={{ textDecoration: "underline" }}>Take 2 mins to learn more</span>
          </p>
        </div>
      );
    }

    function BackButton({ onClick, dark = false }) {
      return (
        <button onClick={onClick} style={{
          width: 36, height: 36, borderRadius: "50%",
          background: "#f0f2f5",
          display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#121112" strokeWidth="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
      );
    }

    // ─── Screen 1: Add Funds ─────────────────────────────────────────────────────

    const IMG_ADD_CARD_ICON = "https://www.figma.com/api/mcp/asset/33f77c1a-f447-4edc-b874-47e7879c084b";
    const IMG_BTC = "https://www.figma.com/api/mcp/asset/bcf10835-28c7-4d10-a352-86ae3b442380";
    const IMG_SWITCH = "https://www.figma.com/api/mcp/asset/dced9c56-c45f-4b1a-af11-42b6de031035";
    const IMG_POWERED_BY = "https://www.figma.com/api/mcp/asset/68babbf2-05b5-4b7d-8ecc-6bea67980dc8";
    const IMG_CHEVRON_LEFT = "https://www.figma.com/api/mcp/asset/916c86fe-9eb6-40a2-b5a5-83859aa5f37c";

    function Screen1({ onNext }) {
      return (
        <div style={{ background: "#fff", height: "100%", display: "flex", flexDirection: "column" }}>
          <LightStatusBar />

          <div style={{ padding: "6px 16px" }}>
            <BackButton onClick={() => {}} />
          </div>

          <RiskBanner />

          {/* Widget content */}
          <div style={{ padding: "0 20px", flex: 1, display: "flex", flexDirection: "column" }}>

            {/* Title */}
            <h1 style={{ fontSize: 28, fontWeight: 600, color: "#000", letterSpacing: "-0.56px", marginTop: 20, marginBottom: 20 }}>
              Add funds
            </h1>

            {/* Card selectors */}
            <div style={{ display: "flex", alignItems: "center", gap: 0, position: "relative" }}>
              {/* Add card pill — clickable */}
              <button onClick={onNext} style={{
                flex: 1, background: "#f4f4f4", borderRadius: 12, padding: "16px",
                display: "flex", alignItems: "center", gap: 12,
                border: "none", cursor: "pointer", textAlign: "left",
                transition: "background 0.15s", marginRight: 8
              }}
              onMouseEnter={e => e.currentTarget.style.background = "#eaeaea"}
              onMouseLeave={e => e.currentTarget.style.background = "#f4f4f4"}
              >
                {/* Card outline icon */}
                <div style={{ position: "relative", width: 38, height: 26, flexShrink: 0 }}>
                  <div style={{ width: 38, height: 26, border: "1px solid #000", borderRadius: 2 }} />
                  <img src={IMG_ADD_CARD_ICON} alt="" style={{ position: "absolute", top: 6, left: 12, width: 14, height: 14 }} />
                </div>
                {/* Text */}
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 500, color: "#161616", lineHeight: 1.25 }}>Add<br/>card</div>
                </div>
                {/* Chevron down */}
                <svg width="12" height="7" viewBox="0 0 12 7" fill="none" style={{ flexShrink: 0 }}>
                  <path d="M1 1l5 5 5-5" stroke="#161616" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>

              {/* Switch icon */}
              <div style={{ width: 30, height: 30, background: "#fff", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, margin: "0 -15px", zIndex: 1, boxShadow: "0 0 0 1px rgba(0,0,0,0.06)" }}>
                <img src={IMG_SWITCH} alt="" style={{ width: 16, height: 16, transform: "rotate(180deg)" }} />
              </div>

              {/* BTC pill — static */}
              <div style={{ flex: 1, background: "#f4f4f4", borderRadius: 12, padding: "16px", display: "flex", alignItems: "center", gap: 12 }}>
                <img src={IMG_BTC} alt="BTC" style={{ width: 36, height: 36, borderRadius: "50%", flexShrink: 0 }} />
                <div>
                  <div style={{ fontSize: 16, fontWeight: 500, color: "#161616", lineHeight: 1.25 }}>Bitcoin<br/>BTC</div>
                </div>
              </div>
            </div>

            {/* Amount display — static */}
            <div style={{ textAlign: "center", marginTop: 48, marginBottom: 8 }}>
              <div style={{ fontSize: 52, fontWeight: 400, color: "#121112", lineHeight: 1 }}>£0</div>
              <div style={{ fontSize: 12, color: "#5d5e6e", marginTop: 8 }}>0.00 BTC</div>
            </div>

            <div style={{ flex: 1 }} />

            {/* Deposit CTA — always disabled on this screen */}
            <div style={{ paddingBottom: 16 }}>
              <button disabled style={{
                width: "100%", padding: "12px 16px", borderRadius: 9999,
                background: "#e1e2e5", color: "#8b8c9a",
                fontSize: 16, fontWeight: 500,
                cursor: "default"
              }}>
                Deposit
              </button>
            </div>

            {/* Powered by Uphold */}
            <div style={{ display: "flex", justifyContent: "center", paddingBottom: 24 }}>
              <div style={{ position: "relative", width: 149, height: 30, overflow: "hidden", flexShrink: 0 }}>
                <div style={{ position: "absolute", top: 0, right: "4.1%", bottom: "2.5%", left: "-3.6%" }}>
                  <img src={IMG_POWERED_BY} alt="Powered by Uphold" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", maxWidth: "none", display: "block" }} />
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Screen 2: Skeleton Loading ──────────────────────────────────────────────

    function Screen2({ onNext }) {
      useEffect(() => {
        const t = setTimeout(onNext, 4000);
        return () => clearTimeout(t);
      }, [onNext]);

      return (
        <div style={{ background: "#fff", height: "100%", display: "flex", flexDirection: "column", pointerEvents: "none" }}>
          <DynamicIsland />
          <div style={{ padding: "12px 20px", background: "rgba(255,255,255,0.9)", borderBottom: "1px solid #f0f0f0" }}>
            <div className="shimmer" style={{ width: 80, height: 20, borderRadius: 6, marginBottom: 8 }} />
          </div>
          <div style={{ flex: 1, padding: "24px 20px", display: "flex", flexDirection: "column", gap: 12 }}>
            <div className="shimmer" style={{ width: 220, height: 28, borderRadius: 8 }} />
            {[1,2,3,4].map(i => (
              <div key={i} className="shimmer" style={{ width: "100%", height: 80, borderRadius: 16 }} />
            ))}
          </div>
        </div>
      );
    }

    // ─── Screen 3: Select Payment Method ─────────────────────────────────────────

    function Screen3({ onNext, onBack }) {
      const methods = [
        { label: "Credit and debit card", sub: "Instant · 3.99% fee", icon: "💳", happy: true },
        { label: "Apple Pay", sub: "Instant · 3.99% fee", icon: "🍎" },
        { label: "Google Pay", sub: "Instant · 3.99% fee", icon: "G" },
        { label: "Bank transfer", sub: "1–3 days · No fee", icon: "🏦" },
      ];

      return (
        <div style={{ background: "#fff", height: "100%", display: "flex", flexDirection: "column" }}>
          <DynamicIsland />
          <div style={{ display: "flex", alignItems: "center", padding: "8px 20px" }}>
            <BackButton onClick={onBack} />
            <div style={{ flex: 1, textAlign: "center", marginRight: 36 }}>
              <span style={{ fontSize: 13, color: "#8b8c9a" }}>Add funds</span>
            </div>
          </div>

          <div style={{ padding: "16px 20px 0" }}>
            <h1 style={{ fontSize: 26, fontWeight: 700, color: "#121112", letterSpacing: "-0.2px", marginBottom: 4 }}>
              Select a payment method
            </h1>
            <p style={{ fontSize: 14, color: "#6b7594" }}>Choose how you'd like to pay</p>
          </div>

          <div style={{ padding: "20px 20px 0", display: "flex", flexDirection: "column", gap: 8 }}>
            {methods.map((m, i) => (
              <button key={i} onClick={() => m.happy && onNext()} style={{
                width: "100%", padding: "16px",
                background: "#f8f9fb", borderRadius: 16,
                display: "flex", alignItems: "center", gap: 14,
                border: "1.5px solid #eef0f4",
                cursor: m.happy ? "pointer" : "default",
                textAlign: "left",
                transition: "border-color 0.15s, background 0.15s"
              }}
              onMouseEnter={e => { if (m.happy) { e.currentTarget.style.borderColor = "#3650c2"; e.currentTarget.style.background = "#f0f4ff"; } }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#eef0f4"; e.currentTarget.style.background = "#f8f9fb"; }}
              >
                <div style={{ width: 44, height: 44, borderRadius: 12, background: "#eef0f4", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>
                  {m.icon}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: "#121112" }}>{m.label}</div>
                  <div style={{ fontSize: 12, color: "#6b7594", marginTop: 2 }}>{m.sub}</div>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b0b5c4" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ─── Screen 4: Select Card ────────────────────────────────────────────────────

    function Screen4({ onNext, onBack }) {
      const cards = [
        { brand: "Mastercard", last4: "4321", sub: "Deposits only", badge: null, happy: true },
        { brand: "Visa", last4: "8765", sub: "GBP", badge: null },
        { brand: "Card", last4: "2468", sub: "Low acceptance rate", badge: "info" },
        { brand: "Mastercard", last4: "1357", sub: "Expired", badge: "error" },
      ];

      function BrandIcon({ brand }) {
        if (brand === "Visa") return <span style={{ fontSize: 12, fontWeight: 900, color: "#1a1f71", background: "#e8eaef", padding: "2px 5px", borderRadius: 3 }}>VISA</span>;
        if (brand === "Mastercard") return (
          <div style={{ width: 28, height: 18, position: "relative" }}>
            <div style={{ position: "absolute", left: 0, width: 18, height: 18, borderRadius: "50%", background: "#eb001b", opacity: 0.9 }} />
            <div style={{ position: "absolute", left: 10, width: 18, height: 18, borderRadius: "50%", background: "#f79e1b", opacity: 0.9 }} />
          </div>
        );
        return <svg width="24" height="18" viewBox="0 0 24 18" fill="none" stroke="#8b8c9a" strokeWidth="1.5"><rect x="1" y="3" width="22" height="14" rx="2"/><path d="M1 7h22"/></svg>;
      }

      return (
        <div style={{ background: "#fff", height: "100%", display: "flex", flexDirection: "column" }}>
          <DynamicIsland />
          <div style={{ display: "flex", alignItems: "center", padding: "8px 20px" }}>
            <BackButton onClick={onBack} />
            <div style={{ flex: 1, textAlign: "center", marginRight: 36 }}>
              <span style={{ fontSize: 13, color: "#8b8c9a" }}>Payment method</span>
            </div>
          </div>

          <div style={{ padding: "16px 20px 0" }}>
            <h1 style={{ fontSize: 26, fontWeight: 700, color: "#121112", letterSpacing: "-0.2px", marginBottom: 20 }}>
              Select card
            </h1>

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {cards.map((c, i) => (
                <button key={i} onClick={() => c.happy && onNext()} style={{
                  width: "100%", padding: "14px 16px",
                  background: "#f8f9fb", borderRadius: 16,
                  display: "flex", alignItems: "center", gap: 12,
                  border: "1.5px solid #eef0f4",
                  cursor: c.happy ? "pointer" : "default",
                  textAlign: "left",
                  opacity: c.badge === "error" ? 0.5 : 1,
                  transition: "border-color 0.15s, background 0.15s"
                }}
                onMouseEnter={e => { if (c.happy) { e.currentTarget.style.borderColor = "#3650c2"; e.currentTarget.style.background = "#f0f4ff"; } }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = "#eef0f4"; e.currentTarget.style.background = "#f8f9fb"; }}
                >
                  <BrandIcon brand={c.brand} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#121112" }}>•••• {c.last4}</div>
                    <div style={{ fontSize: 12, color: "#6b7594", marginTop: 1 }}>{c.sub}</div>
                  </div>
                  {c.badge === "info" && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 20, background: "#e8f0fe", color: "#3650c2" }}>Info</span>}
                  {c.badge === "error" && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 20, background: "#fde8e8", color: "#dc2626" }}>Expired</span>}
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#eef0f4", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8b8c9a" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </div>
                </button>
              ))}

              <button style={{
                width: "100%", padding: "14px 16px",
                background: "transparent", borderRadius: 16,
                display: "flex", alignItems: "center", gap: 12,
                border: "1.5px dashed #d1d5db",
                cursor: "pointer", textAlign: "left"
              }}>
                <div style={{ width: 40, height: 40, borderRadius: 12, background: "#f4f4f4", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b8c9a" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>
                </div>
                <span style={{ fontSize: 14, fontWeight: 600, color: "#8b8c9a" }}>Add debit and credit card</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Screen 5: CVV Entry ──────────────────────────────────────────────────────

    function Screen5({ onNext, onBack }) {
      const [cvv, setCvv] = useState("");
      const [cvvError, setCvvError] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => {
        const t = setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
        return () => clearTimeout(t);
      }, []);

      function handleConfirm() {
        if (cvv.length < 3) { setCvvError(true); return; }
        onNext(cvv);
      }

      return (
        <div style={{ height: "100%", position: "relative" }}>
          {/* Screen 4 rendered as non-interactive background */}
          <div style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
            <Screen4 onNext={() => {}} onBack={() => {}} />
          </div>

          {/* Dimmed overlay */}
          <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.35)", zIndex: 10 }} onClick={onBack} />

          {/* Bottom sheet */}
          <div className="sheet-slide-up" style={{
            position: "absolute", bottom: 0, left: 0, right: 0,
            background: "#fff",
            borderRadius: "32px 32px 0 0",
            padding: "8px 20px 40px",
            zIndex: 20,
            boxShadow: "0 -8px 40px rgba(0,0,0,0.12)"
          }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: "#e2e5ea" }} />
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
              <BackButton onClick={onBack} />
              <h2 style={{ fontSize: 20, fontWeight: 700, color: "#121112" }}>Security verification</h2>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", background: "#f8f9fb", borderRadius: 14, marginBottom: 20, border: "1px solid #eef0f4" }}>
              <div style={{ width: 28, height: 18, position: "relative" }}>
                <div style={{ position: "absolute", left: 0, width: 18, height: 18, borderRadius: "50%", background: "#eb001b" }} />
                <div style={{ position: "absolute", left: 10, width: 18, height: 18, borderRadius: "50%", background: "#f79e1b", opacity: 0.9 }} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#121112" }}>Mastercard •••• 4321</div>
                <div style={{ fontSize: 12, color: "#6b7594" }}>GBP · Deposits only</div>
              </div>
            </div>

            <label style={{ fontSize: 13, fontWeight: 600, color: "#6b7594", display: "block", marginBottom: 8 }}>CVV / CVC</label>

            <div style={{
              height: 56, borderRadius: 12,
              border: `1.5px solid ${cvvError ? "#dc2626" : cvv ? "#3650c2" : "#d1d5db"}`,
              background: "#fff", display: "flex", alignItems: "center", padding: "0 16px",
              marginBottom: cvvError ? 6 : 20, transition: "border-color 0.2s"
            }} onClick={() => inputRef.current && inputRef.current.focus()}>
              <input
                ref={inputRef}
                type="tel"
                maxLength={3}
                value={cvv}

          notes.forEach((freq, i) => {
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = ctx.currentTime + i * 0.09;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.28, t + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
            osc.start(t);
            osc.stop(t + 0.35);
          });
          // Short metallic ring at the end
          const ring = ctx.createOscillator();
          const ringGain = ctx.createGain();
          ring.connect(ringGain);
          ringGain.connect(ctx.destination);
          ring.type = 'triangle';
          ring.frequency.value = 1400;
          const rt = ctx.currentTime + 0.32;
          ringGain.gain.setValueAtTime(0, rt);
          ringGain.gain.linearRampToValueAtTime(0.18, rt + 0.01);
          ringGain.gain.exponentialRampToValueAtTime(0.001, rt + 0.5);
          ring.start(rt);
          ring.stop(rt + 0.5);
        } catch (e) {}
      }, []);

      useEffect(() => {
        const t = setTimeout(onNext, 4000);
        return () => clearTimeout(t);
      }, [onNext]);

      return (
        <div style={{ background: "#f0f2f5", height: "100%", display: "flex", flexDirection: "column" }}>
          <LightStatusBar />


          {/* Centered content */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 16px" }}>
            {/* Icon with countdown ring */}
            <div className="success-icon" style={{ width: 120, height: 120, position: "relative", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 24 }}>
              {/* Countdown SVG ring */}
              <svg width="120" height="120" viewBox="0 0 120 120" style={{ position: "absolute", inset: 0 }}>
                {/* Track */}
                <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(52,211,153,0.15)" strokeWidth="3" />
                {/* Draining ring */}
                <circle
                  className="countdown-ring"
                  cx="60" cy="60" r="54"
                  fill="none"
                  stroke="#10b981"
                  strokeWidth="3"
                  strokeLinecap="round"
                  strokeDasharray="339"
                  strokeDashoffset="0"
                />
              </svg>
              {/* Green icon */}
              <div style={{ width: 80, height: 80, borderRadius: "50%", background: "linear-gradient(135deg, #34d399 0%, #10b981 100%)", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 8px 32px rgba(52,211,153,0.4)" }}>
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                  <polyline className="success-check" points="20 6 9 17 4 12"/>
                </svg>
              </div>
            </div>

            {/* Title */}
            <p className="success-title" style={{ fontSize: 28, fontWeight: 700, color: "#121112", textAlign: "center", lineHeight: "36px", letterSpacing: "-0.2px" }}>
              £{amtNum.toFixed(2)} deposited to BTC account
            </p>
          </div>

          {/* Close button */}
          <div style={{ padding: "0 16px 12px" }}>
            <button onClick={onNext} style={{
              width: "100%", height: 48, borderRadius: 9999,
              background: "#090d14", color: "#fff", border: "none",
              fontSize: 16, fontWeight: 600, cursor: "pointer"
            }}>
              Close
            </button>
          </div>

          {/* Powered by Uphold */}
          <div style={{ display: "flex", justifyContent: "center", paddingBottom: 24 }}>
            <div style={{ position: "relative", width: 149, height: 30, overflow: "hidden", flexShrink: 0 }}>
              <div style={{ position: "absolute", top: 0, right: "4.1%", bottom: "2.5%", left: "-3.6%" }}>
                <img src={IMG_POWERED_BY} alt="Powered by Uphold" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", maxWidth: "none", display: "block", mixBlendMode: "multiply" }} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Screen 15: Partner Screen ────────────────────────────────────────────────

    function Screen15({ onRestart }) {
      const cryptos = [
        { name: "Bitcoin", ticker: "BTC", price: "57,724", change: "+2.34%", up: true },
        { name: "XRP", ticker: "XRP", price: "0.5823", change: "+1.12%", up: true },
        { name: "Dogecoin", ticker: "DOGE", price: "0.1234", change: "-0.87%", up: false },
        { name: "Ethereum", ticker: "ETH", price: "3,124", change: "+3.21%", up: true },
        { name: "Solana", ticker: "SOL", price: "142.50", change: "+5.43%", up: true },
        { name: "Cardano", ticker: "ADA", price: "0.4521", change: "-1.23%", up: false },
      ];

      return (
        <div style={{ background: "#eaf1f2", height: "100%", display: "flex", flexDirection: "column" }}>
          <LightStatusBar />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
              <span style={{ fontSize: 16, fontWeight: 700, color: "#000" }}>IG · Crypto</span>
            </div>
            <div style={{ display: "flex", gap: 14 }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </div>
          </div>

          <RiskBanner />

          <div style={{ padding: "16px 20px 8px" }}>
            <h1 style={{ fontSize: 22, fontWeight: 700, color: "#000" }}>Assets</h1>
          </div>

          <div style={{ flex: 1, overflowY: "auto", padding: "0 20px" }}>
            {cryptos.map((c, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 12, padding: "14px 0",
                borderBottom: i < cryptos.length - 1 ? "1px solid rgba(0,0,0,0.06)" : "none"
              }}>
                <div style={{ width: 40, height: 40, borderRadius: "50%", background: c.ticker === "BTC" ? "#f7931a" : c.ticker === "ETH" ? "#627eea" : "#8b8c9a", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ color: "#fff", fontSize: 14, fontWeight: 700 }}>{c.ticker[0]}</span>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: "#000" }}>{c.name}</div>
                  <div style={{ fontSize: 12, color: "#8b8c9a" }}>{c.ticker}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: "#000" }}>${c.price}</div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: c.up ? "#16a34a" : "#dc2626" }}>{c.change}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ padding: "12px 20px" }}>
            <button onClick={onRestart} style={{
              width: "100%", padding: "14px", borderRadius: 12,
              background: "#3650c2", color: "#fff", fontSize: 15, fontWeight: 700
            }}>
              Add more funds
            </button>
          </div>

          <div style={{ display: "flex", justifyContent: "space-around", padding: "12px 0 28px", background: "#fff", borderTop: "1px solid #e5e7eb" }}>
            {["Assets","Portfolio","Search","Explore","Account"].map((tab, i) => (
              <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={i === 0 ? "#3650c2" : "#8b8c9a"} strokeWidth="2">
                  {i === 0 && <g><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></g>}
                  {i === 1 && <g><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></g>}
                  {i === 2 && <g><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></g>}
                  {i === 3 && <g><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></g>}
                  {i === 4 && <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>}
                </svg>
                <span style={{ fontSize: 10, color: i === 0 ? "#3650c2" : "#8b8c9a", fontWeight: i === 0 ? 600 : 400 }}>{tab}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Main Prototype ───────────────────────────────────────────────────────────

    function WidgetPrototype() {
      const [screen, setScreen] = useState(1);
      const [cvv, setCvv] = useState("");
      const [amount, setAmount] = useState("100");

      function go(n) { setScreen(n); }
      function restart() { setScreen(1); setCvv(""); setAmount("100"); }

      function renderScreen() {
        switch (screen) {
          case 1:  return <Screen1 onNext={() => go(2)} />;
          case 2:  return <Screen2 onNext={() => go(3)} />;
          case 3:  return <Screen3 onNext={() => go("sk34")} onBack={() => go(1)} />;
          case "sk34": return <ScreenSK34 onNext={() => go(4)} />;
          case 4:  return <Screen4 onNext={() => go(5)} onBack={() => go(3)} />;
          case 5:  return <Screen5 onNext={v => { setCvv(v); go(6); }} onBack={() => go(4)} />;
          case 6:  return <Screen6 cvv={cvv} onNext={() => go(7)} />;
          case 7:  return <Screen7 onNext={v => { setAmount(v); go(9); }} onBack={() => go(4)} />;
          case 9:  return <Screen9 onNext={() => go(10)} />;
          case 10: return <Screen10 amount={amount} onNext={() => go(11)} onBack={() => go(7)} />;
          case 11: return <Screen11 onNext={() => go(12)} />;
          case 12: return <Screen12 onNext={() => go(13)} onBack={() => go(10)} />;
          case 13: return <Screen13 onNext={() => go(14)} />;
          case 14: return <Screen14 amount={amount} onNext={() => go(15)} onBack={() => go(12)} />;
          case 15: return <Screen15 onRestart={restart} />;
          default: return null;
        }
      }

      return (
        <>
          <style>{STYLES}</style>
          {/* Fixed restart button */}
          <button
            onClick={restart}
            style={{
              position: "fixed", top: 20, right: 20,
              background: "rgba(18,17,18,0.82)",
              backdropFilter: "blur(12px)",
              color: "#fff",
              border: "none",
              borderRadius: 24,
              padding: "8px 14px",
              fontSize: 13, fontWeight: 600,
              display: "flex", alignItems: "center", gap: 6,
              cursor: "pointer",
              zIndex: 9999,
              boxShadow: "0 4px 16px rgba(0,0,0,0.2)"
            }}>
            <span style={{ fontSize: 14 }}>↺</span> Restart
          </button>
          <div style={{
            minHeight: "100vh",
            background: "linear-gradient(135deg, #e8edf2 0%, #d4dce6 100%)",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: 40,
            position: "relative"
          }}>
            {(screen === 2 || screen === 9) && (
              <div style={{
                position: "absolute", top: 24, left: "50%", transform: "translateX(-50%)",
                display: "flex", alignItems: "center", gap: 8,
                background: "rgba(18,17,18,0.72)",
                backdropFilter: "blur(12px)",
                color: "#fff",
                borderRadius: 24,
                padding: "10px 18px",
                fontSize: 13, fontWeight: 600,
                letterSpacing: 0.1,
                boxShadow: "0 4px 16px rgba(0,0,0,0.15)",
                whiteSpace: "nowrap",
                zIndex: 10
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="3"/>
                  <path d="M9 12h6M12 9v6"/>
                </svg>
                Opening widget…
              </div>
            )}
            <div style={{ position: "relative", flexShrink: 0 }}>
            <div style={{
              width: 390,
              height: 844,
              background: "#fff",
              borderRadius: 48,
              boxShadow: "0 32px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.06)",
              overflow: "hidden",
              position: "relative",
              flexShrink: 0
            }}>
              <div style={{ height: "100%", overflowY: "hidden", position: "relative" }}>
                {renderScreen()}
              </div>

            </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<WidgetPrototype />);
  </script>
</body>
</html>
